<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Bordarte AI Co-Creator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Bordarte AI Co-Creator</h1>

  <div class="container">

    <div class="form-section">

      <h2>Selecciona género</h2>

      <div class="gender-selector">
        <label>
          <input type="radio" name="gender" value="masculino" checked>
          Masculino
        </label>
        <label>
          <input type="radio" name="gender" value="femenino">
          Femenino
        </label>
      </div>

      <h2>Selecciona color disponible</h2>
      <div id="colorOptions" class="image-selector"></div>

      <hr>

      <h2>Tipo de diseño</h2>

      <div class="mode-selector">
        <label>
          <input type="radio" name="mode" value="text" checked>
          Texto
        </label>
        <label>
          <input type="radio" name="mode" value="upload">
          Subir PNG
        </label>
      </div>

      <div id="textMode">
        <textarea id="idea" placeholder="Escribe tu texto aquí"></textarea>

        <select id="style">
          <option value="minimalista">Minimalista</option>
          <option value="romantico">Romántico</option>
          <option value="urbano">Urbano</option>
        </select>

        <input type="range" id="fontSize" min="16" max="48" value="24">
        <input type="color" id="designColor" value="#000000">
      </div>

      <div id="uploadMode" style="display:none;">
        <input type="file" id="pngUpload" accept="image/png">
      </div>

      <button onclick="generateDesign()">Generar Visualización</button>
      <button onclick="sendWhatsApp()">Solicitar Cotización</button>

    </div>

    <div class="preview-section">
      <div class="hoodie">
        <img id="hoodieBase" src="m-blanco.jpg">
        <div id="designOverlay">
          <div id="designText"></div>
          <img id="designPng">
        </div>
      </div>
    </div>

  </div>

<script src="app.js"></script>
</body>
</html>
